          description: Unique identifier of the schema profile
      responses:
        '200':
          description: Schema Profile returned successfully
          content:
            application/ld+json:
              schema:
                type: object
                properties:
                  schema_profile:
                    type: object
                    description: Structure of a valid Schema Profile (JSON-LD format)
                    required:
                      - '@context'
                      - '@id'
                      - title
                      - asset_schema
                      - fungible
                      - organization_key
                      - facets
                    properties:
                      '@context':
                        oneOf:
                          - type: string
                            format: uri
                            example: 'https://www.w3.org/ns/did/v1.1'
                          - type: object
                          - type: array
                            items:
                              oneOf:
                                - type: string
                                  format: uri
                                - type: object
                      '@id':
                        type: string
                        format: uri
                        example: 'did:example:56745689abcdefghi#schema-profile'
                        description: Unique identifier for the Schema Profile.
                      title:
                        type: string
                        example: Example Schema Profile
                        description: Human-readable title of the Schema Profile.
                      asset_schema:
                        type: string
