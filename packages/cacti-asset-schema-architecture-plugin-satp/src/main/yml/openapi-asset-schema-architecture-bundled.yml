openapi: 3.0.3
info:
  title: SATP - Asset Schema Architecture for Asset Exchanges
  version: 0.0.1
  description: |-
    SATP is a protocol operating between two gateways that conducts the transfer of a digital asset from one gateway to another. The protocol establishes a secure channel between the endpoints and implements a 2-phase commit to ensure the properties of transfer atomicity, consistency, isolation and durability.
    The Asset Schema Architecture for Asset Exchanges defines the data structures and schemas used in the SATP protocol. It provides a standardized way to represent assets, their properties, and the transactions that involve them. It is designed to be flexible and extensible, allowing for the representation of a wide variety of asset types and their associated metadata.

    This API defines the registry, asset schema authority and asset provider facing APIs.

    **Additional Resources**:
    - [Asset Schema Architecture for Asset Exchange](https://datatracker.ietf.org/doc/html/draft-avrilionis-satp-asset-schema-architecture-06)
    - [Asset Profiles for Asset Exchange draft](https://datatracker.ietf.org/doc/draft-avrilionis-satp-asset-profiles/)
  contact:
    name: Hyperledger Cacti
  x-logo:
    altText: Cacti logo
    backgroundColor: '#fafafa'
    url: 'https://github.com/hyperledger/cacti/blob/main/images/HL_Cacti_Logo_Color.png'
externalDocs:
  description: 'For more information about the SATP Gateway Client, refer to the official documentation.'
  url: 'https://github.com/hyperledger/cacti/tree/main/packages/cactus-plugin-satp-hermes/README.md'
servers:
  - url: 'http://{host}:{port}/api/@hyperledger/cacti-asset-schema-architecture/registry'
    description: Registry server
    variables:
      host:
        default: localhost
      port:
        default: '3000'
  - url: 'http://{host}:{port}/api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority'
    description: Asset Schema Authority server
    variables:
      host:
        default: localhost
      port:
        default: '3002'
  - url: 'http://{host}:{port}/api/@hyperledger/cacti-asset-schema-architecture/asset-provider'
    description: Asset Provider server
    variables:
      host:
        default: localhost
      port:
        default: '3020'
tags:
  - name: Registry
    description: API endpoints for interacting with the Registry
  - name: AssetSchemaAuthority
    description: API endpoints for interacting with the Asset Schema Authority
  - name: AssetProvider
    description: API endpoints for interacting with the Asset Provider
paths:
  /api/@hyperledger/cacti-asset-schema-architecture/registry/register-token-issuance-authorization:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/register-token-issuance-authorization
      summary: Register Token Issuance Authorization
      description: |
        This endpoint allows a client to register Token Issuance Authorization (TIA), signed by a given Asset Schema Authority (ASA).
      operationId: registerTokenIssuanceAuthorization
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              properties:
                '@context':
                  oneOf:
                    - type: string
                    - type: object
                    - type: array
                      items:
                        anyOf:
                          - type: string
                          - type: object
                  description: |
                    Typically includes "https://www.w3.org/2018/credentials/v1" and may include domain-specific contexts.
                type:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: |
                    Includes "VerifiablePresentation" and optionally "TokenIssuanceAuthorization".
                issuer:
                  type: string
                  description: |
                    DID or URI of the Asset Schema Authority issuing (signing) this TIA VP.
                holder:
                  type: string
                  description: |
                    DID or URI of the Asset Provider for whom this TIA VP is issued.
                verifiableCredential:
                  type: array
                  items:
                    type: object
                    properties:
                      '@context':
                        oneOf:
                          - type: string
                          - type: object
                          - type: array
                            items:
                              anyOf:
                                - type: string
                                - type: object
                      id:
                        type: string
                        format: uri
                      type:
                        type: array
                        items:
                          type: string
                        minItems: 1
                        description: |
                          Includes "VerifiableCredential" and "TokenIssuanceAuthorizationRequest".
                      issuer:
                        type: string
                        description: |
                          DID or URI of the Asset Provider issuing this TIAR.
                      validFrom:
                        type: string
                        format: date-time
                      validUntil:
                        type: string
                        format: date-time
                      credentialSubject:
                        type: object
                        properties:
                          assetProvider:
                            type: object
                            properties:
                              name:
                                type: string
                              id:
                                type: string
                                description: DID or URI of the Asset Provider issuing this TIAR.
                              organizationKey:
                                type: object
                                properties:
                                  publicKey:
                                    type: string
                                  issued:
                                    type: string
                                    format: date-time
                                required:
                                  - publicKey
                                  - issued
                            required:
                              - name
                              - id
                              - organizationKey
                          schemaProfile:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uri
                          networkId:
                            type: string
                        required:
                          - assetProvider
                          - schemaProfile
                          - networkId
                      proof:
                        type: object
                        properties:
                          type:
                            type: string
                          verificationMethod:
                            type: string
                          cryptosuite:
                            type: string
                            description: |
                              The cryptographic suite used for signing, e.g., "eddsa-rdfc-2022".
                          created:
                            type: string
                            format: date-time
                          proofPurpose:
                            type: string
                          proofValue:
                            type: string
                            description: |
                              The cryptographic proof value, typically a JWS or similar signature.
                        required:
                          - type
                          - verificationMethod
                          - cryptosuite
                          - created
                          - proofPurpose
                          - ProofValue
                    required:
                      - '@context'
                      - id
                      - type
                      - issuer
                      - validFrom
                      - validUntil
                      - credentialSubject
                      - proof
                  minItems: 1
                  description: |
                    Contains the Token Issuance Authorization Request VC issued by the Asset Provider.
                proof:
                  type: object
                  properties:
                    type:
                      type: string
                    verificationMethod:
                      type: string
                    cryptosuite:
                      type: string
                      description: |
                        The cryptographic suite used for signing, e.g., "eddsa-rdfc-2022".
                    created:
                      type: string
                      format: date-time
                    proofPurpose:
                      type: string
                    proofValue:
                      type: string
                      description: |
                        The cryptographic proof value, typically a JWS or similar signature.
                  required:
                    - type
                    - verificationMethod
                    - cryptosuite
                    - created
                    - proofPurpose
                    - proofValue
              required:
                - '@context'
                - type
                - issuer
                - holder
                - verifiableCredential
                - proof
      responses:
        '200':
          description: Token issuance authorization registered successfully
          content:
            application/ld+json:
              schema:
                type: object
                description: A JSON-LD response representing the DID for a registered Token Issuance Authorization.
                properties:
                  '@context':
                    description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
                    oneOf:
                      - type: string
                        format: uri
                        example: 'https://www.w3.org/ns/did/v1.1'
                      - type: array
                        items:
                          oneOf:
                            - type: string
                              format: uri
                            - type: object
                  id:
                    type: string
                    pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
                    example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
                    description: A Decentralized Identifier (DID).
                  type:
                    type: string
                    example: TokenIssuanceAuthorizationID
                    description: Semantic type of the object.
                required:
                  - '@context'
                  - id
                  - type
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-asset-schema:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-asset-schema
      summary: Commission an Asset Schema
      description: |
        This endpoint allows a client to commission an Asset Schema into the Registry.
      operationId: commissionAssetSchema
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              properties:
                asset_schema:
                  type: object
                  description: Structure of a valid Asset Schema (JSON-LD format)
                  required:
                    - '@context'
                    - '@id'
                  properties:
                    '@context':
                      oneOf:
                        - type: string
                          format: uri
                          example: 'https://www.w3.org/ns/did/v1.1'
                        - type: object
                          required:
                            - '@version'
                            - fungible
                            - facets
                            - organization_key
                          properties:
                            '@version':
                              type: number
                              format: float
                              description: JSON-LD version.
                              example: 1.1
                            fungible:
                              type: object
                            facets:
                              type: object
                            organization_key:
                              type: object
                        - type: array
                          items:
                            oneOf:
                              - type: string
                                format: uri
                              - type: object
                  additionalProperties: true
                proof:
                  type: object
                  properties:
                    type:
                      type: string
                    created:
                      type: string
                      format: date-time
                    proofPurpose:
                      type: string
                    verificationMethod:
                      type: string
                    jws:
                      type: string
                  required:
                    - type
                    - created
                    - proofPurpose
                    - verificationMethod
                    - jws
              required:
                - asset-schema
                - proof
              additionalProperties: true
      responses:
        '200':
          description: Asset Schema commissioned successfully
          content:
            application/ld+json:
              schema:
                type: object
                description: A JSON-LD response representing the DID for a commissioned Asset Schema.
                properties:
                  '@context':
                    description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
                    oneOf:
                      - type: string
                        format: uri
                        example: 'https://www.w3.org/ns/did/v1.1'
                      - type: array
                        items:
                          oneOf:
                            - type: string
                              format: uri
                            - type: object
                  id:
                    type: string
                    pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
                    example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
                    description: A Decentralized Identifier (DID).
                  type:
                    type: string
                    example: CommissionedAssetSchemaID
                    description: Semantic type of the object.
                required:
                  - '@context'
                  - id
                  - type
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-schema-profile:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-schema-profile
      summary: Commission a Schema Profile
      description: |
        This endpoint allows a client to commission an Schema Profile into the Registry.
      operationId: commissionSchemaProfile
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              properties:
                schema_profile:
                  type: object
                  description: Structure of a valid Schema Profile (JSON-LD format)
                  required:
                    - '@context'
                    - '@id'
                    - title
                    - asset_schema
                    - fungible
                    - organization_key
                    - facets
                  properties:
                    '@context':
                      oneOf:
                        - type: string
                          format: uri
                          example: 'https://www.w3.org/ns/did/v1.1'
                        - type: object
                        - type: array
                          items:
                            oneOf:
                              - type: string
                                format: uri
                              - type: object
                    '@id':
                      type: string
                      format: uri
                      example: 'did:example:56745689abcdefghi#schema-profile'
                      description: Unique identifier for the Schema Profile.
                    title:
                      type: string
                      example: Example Schema Profile
                      description: Human-readable title of the Schema Profile.
                    asset_schema:
                      type: string
                      format: uri
                      example: 'did:example:123456789abcdefghi#asset-schema'
                      description: Reference to the Asset Schema associated with this Schema Profile.
                    fungible:
                      type: boolean
                      description: Indicates if the asset is fungible.
                      example: true
                    organization_key:
                      type: object
                      properties:
                        public_key:
                          type: string
                          format: uri
                          example: 'https://example.com/public-key'
                          description: URI of the public key for the organization.
                        issued:
                          type: string
                          format: date-time
                          example: '2023-10-01T12:00:00Z'
                          description: Timestamp when the public key was issued.
                    facets:
                      type: object
                      description: Additional facets or properties of the Schema Profile.
                  additionalProperties: true
                proof:
                  type: object
                  properties:
                    type:
                      type: string
                    created:
                      type: string
                      format: date-time
                    proofPurpose:
                      type: string
                    verificationMethod:
                      type: string
                    jws:
                      type: string
                  required:
                    - type
                    - created
                    - proofPurpose
                    - verificationMethod
                    - jws
              required:
                - schema-profile
                - proof
              additionalProperties: true
      responses:
        '200':
          description: Schema Profile commissioned successfully
          content:
            application/ld+json:
              schema:
                type: object
                description: A JSON-LD response representing the DID for a commissioned Schema Profile.
                properties:
                  '@context':
                    description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
                    oneOf:
                      - type: string
                        format: uri
                        example: 'https://www.w3.org/ns/did/v1.1'
                      - type: array
                        items:
                          oneOf:
                            - type: string
                              format: uri
                            - type: object
                  id:
                    type: string
                    pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
                    example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
                    description: A Decentralized Identifier (DID).
                  type:
                    type: string
                    example: CommissionedSchemaProfileID
                    description: Semantic type of the object.
                required:
                  - '@context'
                  - id
                  - type
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-tokenized-asset-record:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/commission-tokenized-asset-record
      summary: Commission a Tokenized Asset Record (TAR)
      description: |
        This endpoint allows a client to commission a Tokenized Asset Record (TAR) into the Registry.
      operationId: commissionTokenizedAssetRecord
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              description: Structure of a valid Tokenized Asset Record (JSON-LD format)
              required:
                - '@context'
              properties:
                '@context':
                  oneOf:
                    - type: string
                      format: uri
                      example: 'https://www.w3.org/ns/did/v1.1'
                    - type: object
                    - type: array
                      items:
                        oneOf:
                          - type: string
                            format: uri
                          - type: object
              additionalProperties: true
      responses:
        '200':
          description: Schema Profile commissioned successfully
          content:
            application/ld+json:
              schema:
                type: object
                description: A JSON-LD response representing the DID for a commissioned Tokenized Asset Record (TAR).
                properties:
                  '@context':
                    description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
                    oneOf:
                      - type: string
                        format: uri
                        example: 'https://www.w3.org/ns/did/v1.1'
                      - type: array
                        items:
                          oneOf:
                            - type: string
                              format: uri
                            - type: object
                  id:
                    type: string
                    pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
                    example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
                    description: A Decentralized Identifier (DID).
                  type:
                    type: string
                    example: CommissionedTokenizedAssetRecordID
                    description: Semantic type of the object.
                required:
                  - '@context'
                  - id
                  - type
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/register-asset-schema-authority:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/register-asset-schema-authority
      summary: Register an Asset Schema Authority
      description: |
        This endpoint allows a client to register an Asset Schema Authority into the Registry.
      operationId: registerAssetSchemaAuthority
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              description: A W3C-compliant JSON-LD object containing a DID Document representing an Asset Schema Authority.
              required:
                - '@context'
                - id
                - entity
                - name
                - description
                - verificationMethod
              properties:
                '@context':
                  oneOf:
                    - type: string
                      format: uri
                      example: 'https://www.w3.org/2018/credentials/v1'
                    - type: object
                    - type: array
                      items:
                        oneOf:
                          - type: string
                            format: uri
                          - type: object
                id:
                  type: string
                  format: uri
                  example: 'did:web:example.com'
                  description: The decentralized identifier (DID) of the Asset Schema Authority.
                entity:
                  type: string
                  example: AssetSchemaAuthority
                name:
                  type: string
                  example: Example Asset Schema Authority
                description:
                  type: string
                  example: An example Asset Schema Authority DID Document
              additionalProperties: true
      responses:
        '200':
          description: Asset Schema Authority registered successfully
          content:
            application/ld+json:
              schema:
                type: object
                required:
                  - id
                  - type
                properties:
                  id:
                    type: string
                    format: uri
                    example: 'did:web:example.com#asset-schema-authority'
                  type:
                    type: string
                    example: RegisteredAssetSchemaAuthority
                additionalProperties: true
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/register-asset-provider:
    post:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/register-asset-provider
      summary: Register an Asset Provider
      description: |
        This endpoint allows a client to register an Asset Provider into the Registry.
      operationId: registerAssetProvider
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              type: object
              description: A W3C-compliant JSON-LD object containing a DID Document representing an Asset Provider.
              required:
                - '@context'
                - id
                - entity
                - name
                - description
                - verificationMethod
              properties:
                '@context':
                  oneOf:
                    - type: string
                      format: uri
                      example: 'https://www.w3.org/2018/credentials/v1'
                    - type: object
                    - type: array
                      items:
                        oneOf:
                          - type: string
                            format: uri
                          - type: object
                id:
                  type: string
                  format: uri
                  example: 'did:web:example.com'
                  description: The decentralized identifier (DID) of the Asset Provider.
                entity:
                  type: string
                  example: AssetProvider
                name:
                  type: string
                  example: Example Asset Provider
                description:
                  type: string
                  example: An example Asset Provider DID Document
              additionalProperties: true
      responses:
        '200':
          description: Asset Provider registered successfully
          content:
            application/ld+json:
              schema:
                type: object
                required:
                  - id
                  - type
                properties:
                  id:
                    type: string
                    format: uri
                    example: 'did:web:example.com#asset-provider'
                  type:
                    type: string
                    example: RegisteredAssetProvider
                additionalProperties: true
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/get-asset-schema:
    get:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: get
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/get-asset-schema
      summary: 'Given an unique id, returns an Asset Schema'
      description: |
        This endpoint allows a client to get an Asset Schema, when given an unique id.
      operationId: getAssetSchema
      parameters:
        - name: uid
          in: query
          required: true
          schema:
            type: string
            description: A unique identifier string for an artifact
            example: QmapEvFnkXp6f6w2CqZRhKLhgEn11EuUQn2mH1HF7mnTJQ
          description: Unique identifier of the asset schema
      responses:
        '200':
          description: Asset Schema returned successfully
          content:
            application/ld+json:
              schema:
                type: object
                properties:
                  asset_schema:
                    type: object
                    description: Structure of a valid Asset Schema (JSON-LD format)
                    required:
                      - '@context'
                      - '@id'
                    properties:
                      '@context':
                        oneOf:
                          - type: string
                            format: uri
                            example: 'https://www.w3.org/ns/did/v1.1'
                          - type: object
                            required:
                              - '@version'
                              - fungible
                              - facets
                              - organization_key
                            properties:
                              '@version':
                                type: number
                                format: float
                                description: JSON-LD version.
                                example: 1.1
                              fungible:
                                type: object
                              facets:
                                type: object
                              organization_key:
                                type: object
                          - type: array
                            items:
                              oneOf:
                                - type: string
                                  format: uri
                                - type: object
                    additionalProperties: true
                  proof:
                    type: object
                    properties:
                      type:
                        type: string
                      created:
                        type: string
                        format: date-time
                      proofPurpose:
                        type: string
                      verificationMethod:
                        type: string
                      jws:
                        type: string
                    required:
                      - type
                      - created
                      - proofPurpose
                      - verificationMethod
                      - jws
                required:
                  - asset-schema
                  - proof
                additionalProperties: true
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/registry/get-schema-profile:
    get:
      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: get
