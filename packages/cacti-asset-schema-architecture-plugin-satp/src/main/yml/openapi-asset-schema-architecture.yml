      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: get
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/get-asset-schema-authority/{uid}
      summary: Given an unique id, returns the X.509 certificate of an Asset Schema Authority (ASA)
      description: |
        This endpoint allows a client to get the X.509 certificate of an Asset Schema Authority (ASA), when given an unique id.
      operationId: getAssetSchemaAuthority
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: Unique identifier of the Asset Schema Authority (ASA)
      responses:
        '200':
          description: Asset Schema Authority (ASA) returned successfully
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/AssetSchemaAuthorityCertificate'
        '400':
