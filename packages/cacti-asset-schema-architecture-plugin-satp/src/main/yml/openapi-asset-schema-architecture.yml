      tags:
        - Registry
      x-hyperledger-cacti:
        http:
          verbLowerCase: get
          path: /api/@hyperledger/cacti-asset-schema-architecture/registry/get-asset-provider/{uid}
      summary: Given an unique id, returns the X.509 certificate of an Asset Provider
      description: |
        This endpoint allows a client to get the X.509 certificate of an Asset Provider, when given an unique id.
      operationId: getAssetProvider
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: Unique identifier of the Asset Provider
      responses:
        '200':
          description: Asset Provider returned successfully
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/AssetProviderCertificate'
        '400':
