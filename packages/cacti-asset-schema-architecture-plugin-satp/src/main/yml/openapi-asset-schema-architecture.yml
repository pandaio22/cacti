  /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/token-issuance-authorization-request:
    post:
      tags:
        - AssetSchemaAuthority
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/token-issuance-authorization-request
      summary: Request Token Issuance Authorization
      description: |
        This endpoint allows a client to send a token issuance authorization request (TIAR). The request includes the TIAR schema and an Asset Provider signature.
      operationId: requestTokenIssuanceAuthorization
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              $ref: '#/components/schemas/TokenIssuanceAuthorizationRequest'
      responses:
        '200':
          description: Token issuance authorization request successful
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/TokenIssuanceAuthorization'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/asset-schema-certification:
    post:
      tags:
        - AssetSchemaAuthority
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/asset-schema-certification
      summary: Asset Schema Certification
      description: |
        This endpoint allows a client to send an asset schema to be certified by the Asset Schema Authority. If accepted, the Asset Schema Authority digitally signs the asset schema, and includes it in the response.
      operationId: assetSchemaCertification
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              $ref: '#/components/schemas/AssetSchema'
      responses:
        '200':
          description: Asset Schema was certified successfully
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/SignedAssetSchema'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/schema-profile-certification:
    post:
      tags:
        - AssetSchemaAuthority
      x-hyperledger-cacti:
        http:
          verbLowerCase: post
          path: /api/@hyperledger/cacti-asset-schema-architecture/asset-schema-authority/schema-profile-certification
      summary: Schema Profile Certification
      description: |
        This endpoint allows a client to send a schema profile to be certified by the Asset Schema Authority. If accepted, the Asset Schema Authority digitally signs the schema profile, and includes it in the response.
      operationId: schemaProfileCertification
      requestBody:
        required: true
        content:
          application/ld+json:
            schema:
              $ref: '#/components/schemas/SchemaProfile'
      responses:
        '200':
          description: Schema Profile was certified successfully
          content:
            application/ld+json:
              schema:
                $ref: '#/components/schemas/SignedSchemaProfile'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
components:
  schemas:
    $ref: 'schemas.yml#'