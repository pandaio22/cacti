SchemaProfile:
  type: object
  description: Structure of a valid Schema Profile (JSON-LD format)
  required:
    - '@context'
    - '@id'
    - title
    - asset_schema
    - fungible
    - organization_key
    - facets
  properties:
    '@context':
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1.1'
        - type: object
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    '@id':
      type: string
      format: uri
      example: 'did:example:56745689abcdefghi#schema-profile'
      description: Unique identifier for the Schema Profile.
    title:
      type: string
      example: 'Example Schema Profile'
      description: Human-readable title of the Schema Profile.
    asset_schema:
      type: string
      format: uri
      example: 'did:example:123456789abcdefghi#asset-schema'
      description: Reference to the Asset Schema associated with this Schema Profile.
    fungible:
      type: boolean
      description: Indicates if the asset is fungible.
      example: true
    organization_key:
      type: object
      properties:
        public_key:
          type: string
          format: uri
          example: 'https://example.com/public-key'
          description: URI of the public key for the organization.
        issued:
          type: string
          format: date-time
          example: '2023-10-01T12:00:00Z'
          description: Timestamp when the public key was issued.
    facets:
      type: object
      description: Additional facets or properties of the Schema Profile.
  additionalProperties: true

SignedSchemaProfile:
  type: object
  properties:
    schema_profile: 
      $ref: '#/SchemaProfile' 
    proof:
      type: object
      properties:
        type:
          type: string
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        verificationMethod:
          type: string
        jws:
          type: string
      required:
        - type
        - created
        - proofPurpose
        - verificationMethod
        - jws
  required:
    - schema-profile
    - proof
  additionalProperties: true

