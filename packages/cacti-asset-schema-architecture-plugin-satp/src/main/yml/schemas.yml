OLDTokenIssuanceAuthorizationRequest:
  type: object
  properties:
    "@context":
      oneOf:
        - type: string
        - type: object
        - type: array
          items:
            anyOf:
              - type: string
              - type: object
    asset_provider:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
        organization_key:
          type: object
          properties:
            public_key:
              type: string
            issued:
              type: string
              format: date-time
      required:
        - name
        - id
        - organization_key
    schema_profile:
      type: string
    network_id:
      type: string
    proof:
      type: object
      properties:
        type:
          type: string
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        verificationMethod:
          type: string
        jws:
          type: string
      required:
        - type
        - created
        - proofPurpose
        - verificationMethod
        - jws
  required:
    - "@context"
    - asset_provider
    - schema_profile
    - network_id
    - proof

TokenIssuanceAuthorizationRequest:
  type: object
  properties:
    "@context":
      oneOf:
        - type: string
        - type: object
        - type: array
          items:
            anyOf:
              - type: string
              - type: object
    id:
      type: string
      format: uri
    type:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        Includes "VerifiableCredential" and "TokenIssuanceAuthorizationRequest".
    issuer:
      type: string
      description: >
        DID or URI of the Asset Provider issuing this TIAR.
    validFrom:
      type: string
      format: date-time
    validUntil:
      type: string
      format: date-time
    credentialSubject:
      type: object
      properties:
        assetProvider:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
              description: DID or URI of the Asset Provider issuing this TIAR.
            organizationKey:
              type: object
              properties:
                publicKey:
                  type: string
                issued:
                  type: string
                  format: date-time
              required:
                - publicKey
                - issued
          required:
            - name
            - id
            - organizationKey
        schemaProfile:
          type: object
          properties:
            id:
              type: string
              format: uri
        networkId:
          type: string
      required:
        - assetProvider
        - schemaProfile
        - networkId
    proof:
      type: object
      properties:
        type:
          type: string
        verificationMethod:
          type: string
        cryptosuite:
          type: string
          description: >
            The cryptographic suite used for signing, e.g., "eddsa-rdfc-2022".
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        proofValue:
          type: string
          description: >
            The cryptographic proof value, typically a JWS or similar signature.
      required:
        - type
        - verificationMethod
        - cryptosuite
        - created
        - proofPurpose
        - ProofValue
  required:
    - "@context"
    - id
    - type
    - issuer
    - validFrom
    - validUntil
    - credentialSubject
    - proof

TokenIssuanceAuthorization:
  type: object
  properties:
    "@context":
      oneOf:
        - type: string
        - type: object
        - type: array
          items:
            anyOf:
              - type: string
              - type: object
      description: >
        Typically includes "https://www.w3.org/2018/credentials/v1" and may include domain-specific contexts.
    type:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        Includes "VerifiablePresentation" and optionally "TokenIssuanceAuthorization".
    issuer:
      type: string
      description: >
        DID or URI of the Asset Schema Authority issuing (signing) this TIA VP.
    holder:
      type: string
      description: >
        DID or URI of the Asset Provider for whom this TIA VP is issued.
    verifiableCredential:
      type: array
      items:
        $ref: '#/TokenIssuanceAuthorizationRequest'
      minItems: 1
      description: >
        Contains the Token Issuance Authorization Request VC issued by the Asset Provider.
    proof:
      type: object
      properties:
        type:
          type: string
        verificationMethod:
          type: string
        cryptosuite:
          type: string
          description: >
            The cryptographic suite used for signing, e.g., "eddsa-rdfc-2022".
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        proofValue:
          type: string
          description: >
            The cryptographic proof value, typically a JWS or similar signature.
      required:
        - type
        - verificationMethod
        - cryptosuite
        - created
        - proofPurpose
        - proofValue
  required:
    - "@context"
    - type
    - issuer
    - holder
    - verifiableCredential
    - proof

OLDTokenIssuanceAuthorization:
  type: object
  properties:
    token_issuance_authorization_request:
      $ref: '#/TokenIssuanceAuthorizationRequest'
    proof:
      type: object
      properties:
        type:
          type: string
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        verificationMethod:
          type: string
        jws:
          type: string
      required:
        - type
        - created
        - proofPurpose
        - verificationMethod
        - jws
  required:
    - token_issuance_authorization_request
    - proof

TokenIssuanceAuthorizationID:
  type: object
  description: A JSON-LD response representing the DID for a registered Token Issuance Authorization.
  properties:
    '@context':
      description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1.1'
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    id:
      type: string
      pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
      example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
      description: A Decentralized Identifier (DID).
    type:
      type: string
      example: 'TokenIssuanceAuthorizationID'
      description: Semantic type of the object.
  required:
    - '@context'
    - 'id'
    - 'type'

AssetSchema:
  type: object
  description: Structure of a valid Asset Schema (JSON-LD format)
  required:
    - '@context'
    - '@id'
  properties:
    '@context':
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1.1'
        - type: object
          required:
            - '@version'
            - fungible
            - facets
            - organization_key
          properties:
            '@version':
              type: number
              format: float
              description: JSON-LD version.
              example: 1.1
            fungible:
              type: object
            facets:
              type: object
            organization_key:
              type: object
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
  additionalProperties: true

AssetSchemaDidDocument:
  type: object
  description: Structure of a valid Asset Schema DID Document (JSON-LD format)
  required:
    - '@context'
    - id
    - type
    - verificationMethod
  properties:
    '@context':
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1'
        - type: object
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    id:
      type: string
      format: uri
      example: 'did:web:example.com:asset-schema'
      description: Unique identifier for the Asset Schema DID Document.
    type:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        Includes "DIDDocument" and "AssetSchemaDidDocument".
    verificationMethod:
      type: array
      minItems: 1
      items:
        type: object
        required:
          - id
          - type
          - controller
          - publicKeyBase58
        properties:
          id:
            type: string
            format: uri
            example: 'did:web:example.com:asset-schema#controller'
            description: Identifier for the verification method.
          type:
            type: string
            example: 'Ed25519VerificationKey2018'
            description: Type of verification method.
          controller:
            type: string
            format: uri
            example: 'did:web:example.com:controller'
            description: DID of the controller of this Asset Schema DID.
          publicKeyMultibase:
            type: string
            description: Public key of the controller.
    authentication:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        List of verification method IDs allowed for authentication.
    assertionMethod:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        List of verification method IDs allowed for asserting claims or issuing VCs.
  additionalProperties: true

AssetSchemaVerifiableCredential:
  type: object
  description: Structure of a valid Asset Schema Verifiable Credential (JSON-LD format)
  properties:
    '@context':
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1.1'
        - type: object
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    id:
      type: string
      format: uri
      example: 'did:example:56745689abcdefghi#asset-schema-credential'
      description: Unique identifier for the Asset Schema Verifiable Credential.
    type:
      type: array
      items:
        type: string
      minItems: 1
      description: >
        Includes "VerifiableCredential" and "AssetSchemaVerifiableCredential".
    issuer:
      type: string
      format: uri
      example: 'did:web:example.com#asset-schema-authority'
      description: DID or URI of the Asset Schema Authority issuing this VC.
    validFrom:
      type: string
      format: date-time
      example: '2023-10-01T12:00:00Z'
      description: Timestamp stating VC starting validity.
    issuanceDate:
      type: string
      format: date-time
      example: '2023-10-01T12:00:00Z'
      description: Timestamp when the VC was issued.  
    credentialSubject:
      type: object
      properties:
        id:
          type: string
          format: uri
          example: 'did:web:example.com#asset-schema'
          description: DID or URI of the Asset Schema.
        name:
          type: string
          example: 'Example Asset Schema'
          description: Human-readable name of the Asset Schema.
        version:
          type: string
          example: '1.0.0'
          description: Version of the Asset Schema.
        hash:
          type: string
          example: 'QmapEvFnkXp6f6w2CqZRhKLhgEn11EuUQn2mH1HF7mnTJQ'
          description: >
            Unique hash representing the Asset Schema, typically a CID or similar identifier.
        nonce:
          type: string
          example: 'e8774f35ba50616e371649579860b0a8'
          description: >
            Unique number used once to ensure freshness, preventing replay attacks.
        createdBy:
          type: string
          format: uri
          example: 'did:web:example.com#asset-schema-authority'
          description: DID or URI of the entity that created the Asset Schema.
        asset_schema:
          $ref: '#/AssetSchema'
    proof:
      type: object
      properties:
        type:
          type: string
        verificationMethod:
          type: string
        cryptosuite:
          type: string
          description: >
            The cryptographic suite used for signing, e.g., "eddsa-rdfc-2022".
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        proofValue:
          type: string
          description: >
            The cryptographic proof value, typically a JWS or similar signature.
  additionalProperties: true

SignedAssetSchema:
  type: object
  properties:
    asset_schema: 
      $ref: '#/AssetSchema' 
    proof:
