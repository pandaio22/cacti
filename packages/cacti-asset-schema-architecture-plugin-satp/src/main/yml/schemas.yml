AssetSchemaAuthorityCertificate:
  type: object
  description: A W3C-compliant JSON-LD object containing an X.509 certificate representing an Asset Schema Authority.
  required:
    - '@context'
    - '@id'
    - type
    - certificate
  properties:
    '@context':
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/2018/credentials/v1'
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    '@id':
      type: string
      format: uri
      example: 'did:web:example.com'
      description: The decentralized identifier (DID) of the Asset Schema Authority.
    type:
      type: string
      example: 'AssetSchemaAuthority'
    certificate:
      type: string
      format: byte
      description: The X.509 certificate (PEM-encoded, Base64).
  additionalProperties: true

RegisteredAssetSchemaAuthorityID:
  type: object
  required:
    - '@context'
    - '@id'
    - type
  properties:
    '@context':
      type: string
      format: uri
      example: 'https://www.w3.org/2018/credentials/v1'
    '@id':
      type: string
      format: uri
      example: 'did:web:example.com#asset-schema-authority'
    type:
      type: string
      example: 'RegisteredAssetSchemaAuthority'
  additionalProperties: true

