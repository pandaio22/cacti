TokenIssuanceAuthorizationRequest:
  type: object
  properties:
    "@context":
      oneOf:
        - type: string
        - type: object
        - type: array
          items:
            anyOf:
              - type: string
              - type: object
    asset_provider:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
        organization_key:
          type: object
          properties:
            public_key:
              type: string
            issued:
              type: string
              format: date-time
      required:
        - name
        - id
        - organization_key
    schema_profile:
      type: string
    network_id:
      type: string
    proof:
      type: object
      properties:
        type:
          type: string
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        verificationMethod:
          type: string
        jws:
          type: string
      required:
        - type
        - created
        - proofPurpose
        - verificationMethod
        - jws
  required:
    - "@context"
    - asset_provider
    - schema_profile
    - network_id
    - proof

TokenIssuanceAuthorization:
  type: object
  properties:
    token_issuance_authorization_request:
      $ref: '#./schemas.yml#/TokenIssuanceAuthorizationRequest'
    proof:
      type: object
      properties:
        type:
          type: string
        created:
          type: string
          format: date-time
        proofPurpose:
          type: string
        verificationMethod:
          type: string
        jws:
          type: string
      required:
        - type
        - created
        - proofPurpose
        - verificationMethod
        - jws
  required:
    - token_issuance_authorization_request
    - proof

TokenIssuanceAuthorizationID:
  type: object
  description: A JSON-LD response representing the DID for a registered Token Issuance Authorization.
  properties:
    '@context':
      description: The JSON-LD context IRI (or array of IRIs) referencing the DID specification.
      oneOf:
        - type: string
          format: uri
          example: 'https://www.w3.org/ns/did/v1.1'
        - type: array
          items:
            oneOf:
              - type: string
                format: uri
              - type: object
    id:
      type: string
      pattern: '^did:[a-z0-9]+:[a-zA-Z0-9.\-_:%]+$'
      example: 'did:ipfs:QmYwAPJzv5CZsnAztbD1kY8o1XkT27J7zZx1er8JGzNPxJ'
      description: A Decentralized Identifier (DID).
    type:
      type: string
      example: 'TokenIssuanceAuthorizationID'
      description: Semantic type of the object.
  required:
    - '@context'
    - 'id'
    - 'type'